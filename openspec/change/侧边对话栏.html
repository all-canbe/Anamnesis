<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>侧边栏 AI 对话 - 输入区域原型</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #e8eaf0;
    font-family: system-ui, -apple-system, "Microsoft YaHei", sans-serif;
  }

  /* ========== 侧边栏容器 ========== */
  .sidebar {
    width: 380px;
    height: 660px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ========== 顶部标题栏 ========== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid #f0f0f0;
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a2e;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .header-right svg {
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .header-right svg:hover {
    background: #f0f0f5;
  }

  /* ========== 对话区域 ========== */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* 用户消息（右侧） */
  .msg-row {
    display: flex;
    gap: 8px;
  }
  .msg-row.user {
    flex-direction: row-reverse;
  }
  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
  }
  .avatar.user-avatar {
    background: #4f6ef7;
  }
  .avatar.ai-avatar {
    background: linear-gradient(135deg, #6ee7b7, #4f6ef7);
  }
  .bubble {
    max-width: 240px;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.6;
    word-break: break-word;
  }
  .msg-row.user .bubble {
    background: #1a1a2e;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg-row.ai .bubble {
    background: #f0f0f5;
    color: #333;
    border-bottom-left-radius: 4px;
  }

  /* ========== 底部输入区域 ========== */
  .input-area {
    padding: 12px 16px 10px;
    flex-shrink: 0;
  }

  /* 大圆角输入框 */
  .input-box {
    background: #f5f5f5;
    border-radius: 20px;
    padding: 14px 14px 10px;
    display: flex;
    flex-direction: column;
    min-height: 100px;
    position: relative;
    border: 1.5px solid transparent;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-box:focus-within {
    border-color: #4f6ef7;
    box-shadow: 0 0 0 3px rgba(79,110,247,0.08);
  }

  .input-box textarea {
    width: 100%;
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 13.5px;
    line-height: 1.6;
    color: #1a1a2e;
    resize: none;
    font-family: inherit;
    min-height: 36px;
  }
  .input-box textarea::placeholder {
    color: #aaa;
  }

  /* 输入框内底部工具栏 */
  .input-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }
  .toolbar-left {
    display: flex;
    align-items: center;
  }
  .toolbar-right {
    display: flex;
    align-items: center;
  }

  /* "+" 圆形按钮 */
  .btn-attach {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: none;
    background: #e8e8ec;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .btn-attach:hover {
    background: #dcdce0;
  }
  .btn-attach svg {
    color: #666;
  }

  /* 发送按钮 */
  .btn-send {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-send.disabled {
    background: #d5d5da;
    cursor: default;
  }
  .btn-send.disabled svg {
    color: #fff;
    opacity: 0.6;
  }
  .btn-send.active {
    background: #4f6ef7;
    box-shadow: 0 2px 8px rgba(79,110,247,0.35);
  }
  .btn-send.active:hover {
    background: #4261e6;
  }
  .btn-send.active svg {
    color: #fff;
  }

  /* 免责声明 */
  .disclaimer {
    text-align: center;
    font-size: 11px;
    color: #bbb;
    margin-top: 8px;
    padding-bottom: 2px;
  }
</style>
</head>
<body>

<div class="sidebar">

  <!-- 顶部标题栏 -->
  <div class="header">
    <div class="header-left">
      <span class="status-dot"></span>
      <span class="header-title">AI 助手</span>
    </div>
    <div class="header-right">
      <!-- 菜单图标（三横线） -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <!-- 删除图标 -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
      </svg>
      <!-- 展开/收起箭头 -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </div>
  </div>

  <!-- 对话区域 -->
  <div class="chat-area">
    <!-- 用户消息 -->
    <div class="msg-row user">
      <div class="avatar user-avatar">U</div>
      <div class="bubble">你好</div>
    </div>
    <!-- AI 回复 -->
    <div class="msg-row ai">
      <div class="avatar ai-avatar">AI</div>
      <div class="bubble">你好！有什么我可以帮助你的吗？</div>
    </div>
    <!-- 用户消息 -->
    <div class="msg-row user">
      <div class="avatar user-avatar">U</div>
      <div class="bubble">帮我介绍一下你们的功能</div>
    </div>
    <!-- AI 回复 -->
    <div class="msg-row ai">
      <div class="avatar ai-avatar">AI</div>
      <div class="bubble">我可以帮你解答问题、总结文档、生成内容、分析数据等。试试看问我任何问题吧！</div>
    </div>
  </div>

  <!-- 底部输入区域 -->
  <div class="input-area">
    <div class="input-box" id="inputBox">
      <textarea id="chatInput" rows="1" placeholder="向知识库提问..."></textarea>
      <div class="input-toolbar">
        <div class="toolbar-left">
          <!-- "+" 附件按钮 -->
          <button class="btn-attach" title="添加附件">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <div class="toolbar-right">
          <!-- 发送按钮 -->
          <button class="btn-send disabled" id="sendBtn" title="发送">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <div class="disclaimer">内容由 AI 生成，仅供参考</div>
  </div>

</div>

<script>
  const textarea = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');

  // 自动调节高度
  textarea.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    // 切换发送按钮状态
    if (this.value.trim()) {
      sendBtn.classList.remove('disabled');
      sendBtn.classList.add('active');
    } else {
      sendBtn.classList.remove('active');
      sendBtn.classList.add('disabled');
    }
  });
</script>

</body>
</html>
